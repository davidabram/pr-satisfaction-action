name: PR Feedback Slack Node Workflow

on:
  pull_request:
    types:
      - closed

jobs:
  notify-participants:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Send PR feedback Slack DMs
        run: node .github/scripts/pr-feedback-slack.js
        env:
          GITHUB_TOKEN: ${{ github.token }}
          USER_MAP_JSON: ${{ secrets.USER_MAP_JSON }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WORKFLOW_URL: ${{ secrets.SLACK_WORKFLOW_URL }}
